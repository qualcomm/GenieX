name: Build Docker

# Reusable workflow: bake the linux-arm64 GenieX-CLI Docker image from the
# geniex-cli-linux-arm64 artifact (a pkg_zip containing the CLI binary
# plus the SDK runtime libs, produced by //cli:artifact upstream).
#
# PR-time callers pass push=false to validate the image builds + loads;
# release-time callers pass push=true plus image_tags to push to GHCR.
#
# Runs on the self-hosted `linux-arm64` runner so the resulting image
# loads and runs natively for a smoke test, and `docker build` doesn't
# need QEMU.

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label (must be linux/arm64 native)"
        required: false
        type: string
        default: linux-arm64
      push:
        description: "Push the image to ghcr.io (release-time only)"
        required: false
        type: boolean
        default: false
      image_tags:
        description: "Newline-separated list of fully-qualified image tags. Required when push=true."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-docker:
    name: build-docker
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Download linux-arm64 CLI artifact
        uses: actions/download-artifact@v5
        with:
          name: geniex-cli-linux-arm64
          path: cli-artifact/

      - name: Assemble Docker build context
        shell: bash
        run: |
          set -euo pipefail
          ctx="${{ github.workspace }}/docker-context"
          mkdir -p "${ctx}/geniex"
          # //cli:artifact is a pkg_zip containing the geniex binary plus
          # the SDK runtime libs at the root of the archive; unzip into
          # ${ctx}/geniex/ so the Dockerfile's `COPY geniex/ /opt/geniex/`
          # picks up both the binary and its shared-library dependencies.
          unzip -q cli-artifact/artifact.zip -d "${ctx}/geniex/"
          # Bazel pkg_zip doesn't preserve the unix exec bit, so the geniex
          # binary comes out of unzip as mode 0644 and the Dockerfile's
          # ENTRYPOINT can't exec it. Restore +x before the image build.
          chmod +x "${ctx}/geniex/geniex"
          cp cli/release/linux/Dockerfile "${ctx}/Dockerfile"
          echo "Context tree:"
          find "${ctx}" -maxdepth 3 -printf "  %p\n" | head -40

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate image_tags on push
        if: inputs.push
        shell: bash
        env:
          TAGS: ${{ inputs.image_tags }}
        run: |
          set -euo pipefail
          if [[ -z "${TAGS// }" ]]; then
            echo "::error::push=true requires a non-empty image_tags input."
            exit 1
          fi

      # Native arm64 runner → no QEMU, no --platform cross. PR path loads the
      # image into the local daemon; release path pushes straight to GHCR.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ inputs.push && inputs.image_tags || format('geniex-cli:{0}', github.sha) }}
          provenance: false

      - name: Smoke test image (PR path only)
        if: ${{ !inputs.push }}
        shell: bash
        run: docker run --rm "geniex-cli:${{ github.sha }}" --help
