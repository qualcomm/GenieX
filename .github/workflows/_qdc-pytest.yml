name: QDC pytest (reusable)

# Runs the SDK model-running pytest cells on a real QDC X Elite (SC8380XP)
# Windows ARM64 device via the POWERSHELL framework. GitHub runners only
# cover the model-free `api` shard (no Snapdragon hardware); the device-gated
# llama_cpp / qairt cells run here.
#
# QDC's POWERSHELL framework caps a single job at 60 min on-device. With
# the aligned 4B + 7B model pair, each modality's first cell pulls a sizable
# GGUF (~2.4 GB LLM, ~5.8 GB VLM bundle), so we fan out three jobs that
# each load at most one modality:
#   - llama_cpp_llm (4B GGUF, 9 cells)
#   - llama_cpp_vlm (7B GGUF + mmproj, 7 cells)
#   - qairt         (4B + 7B AI Hub bundles, NPU-only — 6 cells)
# All three legs run in parallel; each comfortably fits under the 60-min
# device timeout.
#
# Reuses the benchmark's QDC submit/poll/collect plumbing (sdk/benchmark/qdc/_qdc.py).
# Called by pr-check.yml and test.yml after build-sdk so the SDK artifact is
# shared with the rest of the PR / tag graph instead of rebuilt.

on:
  workflow_call:

permissions:
  contents: read
  packages: read

jobs:
  qdc:
    name: ${{ matrix.leg.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        leg:
          - name: llama_cpp_llm
            marker: llama_cpp and llm
          - name: llama_cpp_vlm
            marker: llama_cpp and vlm
          - name: qairt
            marker: qairt
    env:
      QDC_API_KEY: ${{ secrets.QDC_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v8
        with:
          name: sdk-windows-arm64
          path: pkg-geniex
      - uses: ./.github/actions/install-qdc-sdk
      - run: >
          python tests/qdc/run_qdc_pytest.py
          --pkg-dir pkg-geniex
          --device SC8380XP
          --plugin "${{ matrix.leg.name }}"
          --pytest-marker "${{ matrix.leg.marker }}"
