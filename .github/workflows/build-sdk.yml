name: Build SDK

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux-arm64 or windows-arm64"
        required: true
        type: string
      runner:
        description: "Runner label"
        required: true
        type: string
      upload_artifact:
        description: "Whether to upload SDK artifact"
        required: false
        type: boolean
        default: false
      extra_cmake_flags:
        description: "Additional CMake flags"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-sdk:
    name: build-sdk
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120

    steps:
      - name: Configure Windows Git
        if: inputs.platform == 'windows-arm64'
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          git config --global core.longpaths true
          git config --global core.protectNTFS false
          git config --global core.fscache true
          git config --global core.preloadindex true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version

      - name: Setup Snapdragon SDKs
        if: inputs.platform == 'windows-arm64'
        uses: ./.github/actions/setup-snapdragon-sdks

      - name: Configure HTP signing cert
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $src = "$env:GITHUB_WORKSPACE\.github\certs\hexagon\ggml-htp-v1.pfx"
          $dst = "$env:RUNNER_TEMP\ggml-htp-v1.pfx"
          Copy-Item $src $dst -Force
          Add-Content -Path $env:GITHUB_ENV -Value "HEXAGON_HTP_CERT=$dst"
          Write-Host "HEXAGON_HTP_CERT=$dst"

      - name: Build SDK (Linux)
        if: inputs.platform == 'linux-arm64'
        shell: bash
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
          EXTRA_CMAKE_FLAGS: ${{ inputs.extra_cmake_flags }}
        run: bash .github/scripts/ci/build-sdk.sh

      - name: Setup VS toolchain (Windows)
        if: inputs.platform == 'windows-arm64'
        uses: ./.github/actions/setup-vcvars

      - name: Build SDK (Windows)
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github/scripts/ci/build-sdk.ps1

      - name: Upload SDK artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdk-pkg-${{ inputs.platform }}
          path: sdk/pkg-geniex/
          retention-days: 1
