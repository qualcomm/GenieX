name: Build SDK

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux-arm64 or windows-arm64"
        required: true
        type: string
      runner:
        description: "Runner label"
        required: true
        type: string
      upload_artifact:
        description: "Whether to upload SDK artifact"
        required: false
        type: boolean
        default: false
      extra_cmake_flags:
        description: "Additional CMake flags"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-sdk:
    name: build-sdk
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120

    steps:
      - name: Configure Windows Git
        if: inputs.platform == 'windows-arm64'
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          git config --global core.longpaths true
          git config --global core.protectNTFS false
          git config --global core.fscache true
          git config --global core.preloadindex true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-sdk-${{ inputs.platform }}-${{ github.sha }}
          restore-keys: ccache-sdk-${{ inputs.platform }}-

      - name: Install Linux cross-compile toolchain
        if: inputs.platform == 'linux-arm64'
        shell: bash
        run: |
          sudo apt-get update
          # ccache for build cache; make + aarch64-linux-gnu-{gcc,g++} are the
          # tools the arm64-linux-gnu.cmake toolchain file expects.
          sudo apt-get install -y --no-install-recommends \
            ccache make gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          ccache --max-size=1G

      - name: Install and configure ccache (Windows)
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        run: |
          if (-not (Get-Command ccache -ErrorAction SilentlyContinue)) {
            choco install ccache --no-progress -y
          }
          Add-Content $env:GITHUB_ENV "CCACHE_DIR=${{ github.workspace }}/.ccache"
          ccache --max-size=1G

      - name: Setup Snapdragon SDKs
        if: inputs.platform == 'windows-arm64'
        uses: ./.github/actions/setup-snapdragon-sdks

      - name: Configure HTP signing cert
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $src = "$env:GITHUB_WORKSPACE\.github\certs\hexagon\ggml-htp-v1.pfx"
          $dst = "$env:RUNNER_TEMP\ggml-htp-v1.pfx"
          Copy-Item $src $dst -Force
          Add-Content -Path $env:GITHUB_ENV -Value "HEXAGON_HTP_CERT=$dst"
          Write-Host "HEXAGON_HTP_CERT=$dst"

      - name: Build SDK (Linux)
        if: inputs.platform == 'linux-arm64'
        shell: bash
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
          EXTRA_CMAKE_FLAGS: ${{ inputs.extra_cmake_flags }}
        run: bash .github/scripts/ci/build-sdk.sh

      - name: Setup VS toolchain (Windows)
        if: inputs.platform == 'windows-arm64'
        uses: ./.github/actions/setup-vcvars

      - name: Build SDK (Windows)
        if: inputs.platform == 'windows-arm64'
        shell: powershell
        env:
          GENIEX_VERSION: ${{ steps.version.outputs.version }}
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .github/scripts/ci/build-sdk.ps1

      - name: ccache stats (Linux)
        if: always() && inputs.platform == 'linux-arm64'
        shell: bash
        run: ccache --show-stats --verbose || true

      - name: ccache stats (Windows)
        if: always() && inputs.platform == 'windows-arm64'
        shell: powershell
        run: ccache --show-stats --verbose; $true

      - name: Upload SDK artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v5
        with:
          name: sdk-pkg-${{ inputs.platform }}
          path: sdk/pkg-geniex/
          retention-days: 1
