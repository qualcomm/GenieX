name: Publish GitHub Release

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      htp_signed:
        required: true
        type: string
      llama_sha:
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: .

      - name: Collect file list
        id: assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(*.zip *.zip.sha256 *.exe *.exe.sha256 *.tar.gz *.tar.gz.sha256 *.cer *.cer.sha256 *.aar *.aar.sha256)
          {
            echo "files<<EOF"
            for f in "${files[@]}"; do echo "$f"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: actions/github-script@v9
        env:
          VERSION: ${{ inputs.release_tag }}
          FILES: ${{ steps.assets.outputs.files }}
          HTP_SIGNED: ${{ inputs.htp_signed }}
          LLAMA_SHA: ${{ inputs.llama_sha }}
        with:
          script: |
            const release = require('./.github/scripts/release.js');
            await release({ github, context, core });
