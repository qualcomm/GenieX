name: "Setup Snapdragon SDKs"
description: "Install OpenCL and Hexagon SDKs on Windows ARM64 runner and export env vars for the Snapdragon cmake preset"

inputs:
  opencl-version:
    description: "Adreno OpenCL SDK version"
    required: false
    default: "2.3.2"
  hexagon-version:
    description: "Hexagon SDK version"
    required: false
    default: "6.4.0.2"
  hexagon-tools-version:
    description: "Hexagon tools version under $HEXAGON_SDK_ROOT/tools/HEXAGON_Tools"
    required: false
    default: "19.0.04"

runs:
  using: "composite"
  steps:
    - name: Install OpenCL and Hexagon SDKs
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"

        $openclRoot  = "C:\Qualcomm\OpenCL_SDK\${{ inputs.opencl-version }}"
        $hexagonRoot = "C:\Qualcomm\Hexagon_SDK\${{ inputs.hexagon-version }}"

        $openclUrl  = "https://github.com/snapdragon-toolchain/opencl-sdk/releases/download/v${{ inputs.opencl-version }}/adreno-opencl-sdk-v${{ inputs.opencl-version }}-arm64-wos.tar.xz"
        $hexagonUrl = "https://github.com/snapdragon-toolchain/hexagon-sdk/releases/download/v${{ inputs.hexagon-version }}/hexagon-sdk-v${{ inputs.hexagon-version }}-arm64-wos.tar.xz"

        function Install-Tarball($url, $target) {
          if (Test-Path $target) {
            Write-Host "Already installed: $target"
            return
          }
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP ([System.IO.Path]::GetFileName($url))
          Write-Host "Downloading $url"
          curl.exe -L --fail --retry 3 -o $archive $url
          Write-Host "Extracting to $target"
          # tar.exe on Windows handles .tar.xz via libarchive
          tar.exe -xf $archive -C $target --strip-components=1
          Remove-Item $archive -Force
        }

        Install-Tarball $openclUrl  $openclRoot
        Install-Tarball $hexagonUrl $hexagonRoot

        # Windows Driver Kit: required so that Inf2Cat has the driver
        # signability catalog data (`Windows Kits\10\Catalogs\`). The Windows
        # SDK alone is not enough — Inf2Cat will run but report all driver
        # files as "missing or cannot be decompressed from source media".
        # See https://learn.microsoft.com/en-us/windows-hardware/drivers/download-the-wdk
        # Use Inf2Cat itself as the "is WDK fully installed" probe: if the
        # previous install was partial (only Catalogs dir from a failed winget
        # run), Inf2Cat reports Signability test failures. Running it once
        # against an empty directory with /nocat gives us a quick health check.
        $wdkCatalogs = "C:\Program Files (x86)\Windows Kits\10\Catalogs"
        $inf2cat = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.0.*\x86\Inf2Cat.exe" -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty FullName
        $wdkOk = $false
        # Heuristic: run Inf2Cat against an empty dir; a working install exits
        # cleanly, a broken one prints "file could not be copied" or similar.
        if ($inf2cat -and (Test-Path $wdkCatalogs)) {
          $probeDir = Join-Path $env:RUNNER_TEMP "inf2cat-probe-$(Get-Random)"
          New-Item -ItemType Directory -Path $probeDir | Out-Null
          $probeOut = & $inf2cat /driver:$probeDir /os:10_25H2_ARM64 /nocat 2>&1
          Remove-Item -Recurse -Force $probeDir
          # A WDK with missing signability data prints errors even on empty
          # input (NTUSER.DAT corrupt, etc.). A healthy install prints
          # "Signability test complete" with no errors.
          if ($probeOut -match "Signability test complete" -and $probeOut -notmatch "File could not be copied") {
            $wdkOk = $true
          } else {
            Write-Host "Inf2Cat probe indicates partial WDK; reinstalling"
            Write-Host "Probe output: $probeOut"
          }
        }
        if (-not $wdkOk) {
          # winget may have left a half-installed WDK behind. Remove the
          # Catalogs dir so wdksetup doesn't short-circuit by detecting a
          # "present" installation.
          if (Test-Path $wdkCatalogs) {
            Write-Host "Removing partial Catalogs dir before reinstall"
            Remove-Item -Recurse -Force $wdkCatalogs
          }
          Write-Host "Installing Windows Driver Kit (WDK 10.0.26100)"
          # Direct MS CDN link. fwlink redirects through HTML on some arches,
          # giving a 255KB HTML blob that Start-Process rejects.
          $wdkUrl = "https://download.microsoft.com/download/41fb59c2-1723-45f9-a270-96b73ad58233/KIT_BUNDLE_WDK_MEDIACREATION/wdksetup.exe"
          $setup = Join-Path $env:RUNNER_TEMP "wdksetup.exe"
          $log   = Join-Path $env:RUNNER_TEMP "wdksetup.log"
          curl.exe -L --fail --retry 3 -o $setup $wdkUrl
          $size = (Get-Item $setup).Length
          Write-Host "Downloaded wdksetup.exe: $size bytes"
          if ($size -lt 1MB) {
            throw "wdksetup.exe download too small ($size bytes); URL likely returned HTML"
          }
          $p = Start-Process -FilePath $setup `
            -ArgumentList "/features","+","/quiet","/norestart","/log",$log `
            -Wait -PassThru
          Write-Host "wdksetup exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0 -and $p.ExitCode -ne 3010) {
            if (Test-Path $log) {
              Write-Host "--- wdksetup log (tail) ---"
              Get-Content $log -Tail 80
            }
            throw "wdksetup.exe failed with exit code $($p.ExitCode)"
          }
          $inf2cat2 = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.0.*\x86\Inf2Cat.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $inf2cat2) { throw "Inf2Cat.exe missing after WDK install" }
          $probeDir2 = Join-Path $env:RUNNER_TEMP "inf2cat-postprobe-$(Get-Random)"
          New-Item -ItemType Directory -Path $probeDir2 | Out-Null
          $probeOut2 = & $inf2cat2 /driver:$probeDir2 /os:10_25H2_ARM64 /nocat 2>&1
          Remove-Item -Recurse -Force $probeDir2
          if ($probeOut2 -notmatch "Signability test complete") {
            throw "WDK install finished but Inf2Cat probe failed: $probeOut2"
          }
          Write-Host "WDK install verified via Inf2Cat probe"
        } else {
          Write-Host "WDK already fully installed at $wdkCatalogs"
        }

        $winsdkArm64 = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\10.0.*\arm64" -ErrorAction SilentlyContinue |
          Sort-Object Name -Descending | Select-Object -First 1
        if (-not $winsdkArm64) {
          throw "Windows SDK arm64 bin directory not found under C:\Program Files (x86)\Windows Kits\10\bin\"
        }

        $hexagonToolsRoot = Join-Path $hexagonRoot "tools\HEXAGON_Tools\${{ inputs.hexagon-tools-version }}"
        if (-not (Test-Path $hexagonToolsRoot)) {
          throw "HEXAGON_TOOLS_ROOT not found: $hexagonToolsRoot"
        }

        Add-Content -Path $env:GITHUB_ENV -Value "OPENCL_SDK_ROOT=$openclRoot"
        Add-Content -Path $env:GITHUB_ENV -Value "HEXAGON_SDK_ROOT=$hexagonRoot"
        Add-Content -Path $env:GITHUB_ENV -Value "HEXAGON_TOOLS_ROOT=$hexagonToolsRoot"
        Add-Content -Path $env:GITHUB_ENV -Value "WINDOWS_SDK_BIN=$($winsdkArm64.FullName)"

        Write-Host "OPENCL_SDK_ROOT   = $openclRoot"
        Write-Host "HEXAGON_SDK_ROOT  = $hexagonRoot"
        Write-Host "HEXAGON_TOOLS_ROOT= $hexagonToolsRoot"
        Write-Host "WINDOWS_SDK_BIN   = $($winsdkArm64.FullName)"
